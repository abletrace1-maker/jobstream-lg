<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cover Letter</title>
    <style>
        @page {
            size: letter;
            margin: 1in;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #000;
            margin: 0;
            padding: 0;
        }
        p {
            margin-bottom: 1em;
        }
        .content {
            text-align: left;
        }
        /* Style adjustments for standard markdown elements if any */
        a {
            color: #000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="content">
        {{ content | safe }}
    </div>
</body>
</html>
